name: 更新保證金一覽表

# 自動更新時間（GitHub 的 cron 用 UTC）：
#   00:00 UTC = 台北 08:00
#   12:00 UTC = 台北 20:00
# 註：GitHub 的排程在尖峰時段常有數分鐘～數十分鐘延遲，屬正常現象。
on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # 也可在 Actions 頁面手動按「Run workflow」立即更新

# 讓這個工作流程有權限把產生的網頁推回 repo
permissions:
  contents: write

# 避免兩次排程或手動執行同時跑造成衝突
concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 產生 index.html（純標準函式庫，無需安裝套件）
        run: python build.py

      - name: 若資料有變更則提交
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          if git diff --cached --quiet; then
            echo "資料無變化，略過提交。"
          else
            git commit -m "自動更新保證金資料：$(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
